<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    
    <link rel="stylesheet" href="css/styles.css">
    <title>Blog preview card</title>

</head>
<body>
    <main>
        <article class="card">
            <div class="image">
                <img src="assets/images/illustration-article.svg" alt="Article illustration">
            </div>

            <div class="info">
                <div>
                    <span class="badge">Learning</span>
                </div>
                <div>
                    <span class="date">Published 21 Dec 2023</span>
                </div>
                <h1>
                    <a href="#">HTML & CSS foundations</a>
                </h1>
                <p class="text">
                    These languages are the backbone of every website, defining structure, content, and presentation.
                </p>
            </div>

            <div class="author-img">
                <img class="photo" src="assets/images/image-avatar.webp" alt="Author Greg Hooper">
                <span class="greg">Greg Hooper</span>
            </div>
        </article>
    </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Julie30</a>.
  </footer>
</body>
</html>
